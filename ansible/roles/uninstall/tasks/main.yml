---
# 1. STOP THE BEACON
- name: Remove PAM Trap
  become: yes
  lineinfile:
    path: /etc/pam.d/common-auth
    regexp: '.*ssh-auth-check.*'
    state: absent

# 2. UNLOCK & DELETE
- name: Strip Immutability and Shred Logs
  become: yes
  shell: |
    chattr -i /usr/local/bin/ssh-auth-check /var/lib/systemd/ssh-service.log 2>/dev/null || true
    rm -f /usr/local/bin/ssh-auth-check /var/lib/systemd/ssh-service.log
  ignore_errors: yes

# 3. CLEAN FLAGFINDER TRACES
- name: Remove Local Loot Directories (on Workstation)
  delegate_to: localhost
  file:
    path: "{{ playbook_dir }}/loot/{{ inventory_hostname }}"
    state: absent
  become: no